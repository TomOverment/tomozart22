{% extends "account/base_entrance.html" %}
{% load i18n %}

{% block inner_content %}

<h2 class="form-title">{% trans "Sign Up" %}</h2>

<form method="post" action="{% url 'account_signup' %}">
    {% csrf_token %}
    {{ form }}
    <button type="submit" class="btn btn-dark px-4">
        {% trans "Sign Up" %}
    </button>
</form>

{% endblock %}
