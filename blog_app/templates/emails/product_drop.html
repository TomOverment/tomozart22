<h2 style="margin:0 0 10px;">{{ product.name }}</h2>

{% if image_url %}
  <p style="margin:0 0 12px;">
    <a href="{{ product_url }}">
      <img src="{{ image_url }}" alt="{{ product.name }}" style="max-width:520px;width:100%;border-radius:12px;display:block;">
    </a>
  </p>
{% endif %}

<p style="margin:0 0 10px;">
  <strong>Price:</strong> £{{ product.price }}
</p>

{% if product.description %}
  <p style="margin:0 0 14px;">
    {{ product.description }}
  </p>
{% endif %}

<p style="margin:18px 0 0;">
  <a href="{{ product_url }}" style="display:inline-block;padding:10px 14px;border-radius:10px;background:#111;color:#fff;text-decoration:none;">
    View product
  </a>
</p>

<hr style="margin:22px 0;border:none;border-top:1px solid #eee;">

<p style="font-size:12px;opacity:.7;margin:0;">
  You’re receiving this because you subscribed to TomozArt shop updates.
</p>
