{% extends "base.html" %}
{% block title %}{{ post.title }}{% endblock %}

{% block content %}

<div class="container-fluid px-lg-5 golden-layout">
  <div class="row justify-content-center">
    <div class="col-xxl-11">

      <!-- TITLE ROW -->
      <div class="title-row position-relative py-3">
        <a href="{% url 'blog:home' %}"
           class="btn btn-outline-dark btn-sm position-absolute start-0 top-50 translate-middle-y">
          ← Back
        </a>

        <h1 class="fw-bold text-center mb-0">
          {{ post.title }}
        </h1>
      </div>

      <!-- IMAGE + CONTENT ROW -->
      <div class="row align-items-start g-5">

        <!-- IMAGE (66%) -->
        <div class="col-lg-8 text-center">
          {% if post.post_image %}
          <div class="image-hover-wrapper">
            <div class="floating-image">
              <img
                src="{{ post.post_image.url }}"
                class="img-fluid rounded fullscreen-trigger"
                alt="{{ post.title }}"
              />
            </div>
          </div>
          {% endif %}
        </div>

        <!-- CONTENT (33%) -->
        <div class="col-lg-4">
          <p class="text-muted small">
            Created on {{ post.created_on }}
          </p>

          <div class="artwork-description">
            {{ post.content|safe }}
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- Fullscreen Overlay -->
{% if post.post_image %}
<div id="fullscreenOverlay" class="fullscreen-overlay">
  <img src="{{ post.post_image.url }}" alt="{{ post.title }}" />
</div>
{% endif %}

{% endblock %}
