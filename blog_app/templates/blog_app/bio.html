{% extends "base.html" %}
{% load static %}

{% block title %}Artist Bio | Tomozart{% endblock %}

{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">

      <!-- Back Button -->
      <div class="mb-3">
        <a href="{% url 'blog:home' %}" class="btn btn-outline-dark btn-sm">
          ← Back to Home
        </a>
      </div>

      <div class="card login-card-shadow p-4">
        <div class="card-body">

          <h2 class="mb-4 text-center">{{ name }}</h2>

          <p class="text-muted mb-4 text-center">
            {{ bio }}
          </p>

          <hr>

          <h5 class="text-center mb-3">Coming Soon</h5>

          <div class="d-flex flex-wrap justify-content-center gap-2">
            {% for platform, link in social_links.items %}
              <a href="{{ link }}" target="_blank" class="btn btn-outline-dark btn-sm">
                {{ platform|title }}
              </a>
            {% endfor %}
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
