{% extends "base.html" %}
{% load static %}

{% block title %}Edit {{ post.title }}{% endblock %}

{% block content %}

<div class="auth-wrapper">
  <div class="form-card login-card-shadow">

    <h2 class="form-title text-center">Edit Post</h2>
    <p class="form-subtitle text-center mb-4">
      Update your post and save the changes.
    </p>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="text-start">
        {{ form.as_p }}
      </div>

      <div class="d-flex justify-content-center gap-3 flex-wrap mt-4">

        <button type="submit" class="btn btn-dark px-4">
          Save
        </button>

        <a href="{% url 'blog:delete_post' post.id %}" class="btn btn-outline-dark px-4">
          Delete
        </a>

        <a href="{% url 'blog:post_detail' post.slug %}" class="btn btn-outline-dark px-4">
          Back
        </a>

      </div>

    </form>

  </div>
</div>

{% endblock %}
