{% extends "base.html" %}
{% load static %}

{% block title %}Edit {{ post.title }}{% endblock %}

{% block content %}

<div class="auth-wrapper">
  <div class="form-card login-card-shadow">

    <h2 class="form-title text-center">Edit Post</h2>
    <p class="form-subtitle text-center mb-4">
      Update your post and save the changes.
    </p>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-3 text-start">
        <label class="form-label">Title</label>
        {{ form.title }}
      </div>

      <div class="mb-3 text-start">
        <label class="form-label">Content</label>
        {{ form.content }}
      </div>

      <div class="mb-3 text-start">
        <label class="form-label">Status</label>
        {{ form.status }}
      </div>

      <div class="mb-4 text-start">
        <label class="form-label">Post Image</label>
        {{ form.post_image }}
      </div>

      <div class="d-flex justify-content-center gap-3 flex-wrap mt-4">

        <button type="submit" class="btn btn-dark">
          Save
        </button>

        <a href="{% url 'blog:delete_post' post.id %}" class="btn btn-outline-dark">
          Delete
        </a>

        <a href="{% url 'blog:home' %}" class="btn btn-outline-dark">
          Back
        </a>

      </div>

    </form>

  </div>
</div>

{% endblock %}
