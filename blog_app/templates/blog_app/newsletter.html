{% extends "base.html" %}

{% block title %}TomozArt Newsletter{% endblock %}

{% block content %}

<div class="container py-5 text-center" style="max-width:700px;">

    <h1 class="mb-3">TomozArt Mailing List</h1>

    <p class="text-muted mb-4">
        Be the first to hear about new artwork, prints, and upcoming releases.
    </p>

    <form method="post" action="{% url 'blog:newsletter_signup' %}">
        {% csrf_token %}

        <div class="d-flex gap-2 justify-content-center flex-wrap">

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Your email"
                required
                style="max-width:320px;"
            >

            <button type="submit" class="btn btn-dark">
                Subscribe
            </button>

        </div>

    </form>

</div>

{% endblock %}
