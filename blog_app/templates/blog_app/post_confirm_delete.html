{% extends "base.html" %}

{% block title %}Delete {{ post.title }}{% endblock %}

{% block content %}
<style>
  .delete-post-wrap {
    min-height: 70vh;
    display: flex;
    align-items: center;
  }

  .delete-post-card {
    background: rgba(255, 255, 255, 0.88);
    border-radius: 24px;
    box-shadow: 10px 10px 24px rgba(0,0,0,.18);
    border: 1px solid rgba(0,0,0,.06);
    overflow: hidden;
  }

  .delete-post-card .card-body {
    padding: 2.25rem 2rem;
  }

  .delete-post-title {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: .75rem;
    color: #222;
  }

  .delete-post-text {
    font-size: 1.05rem;
    color: rgba(0,0,0,.72);
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }

  .delete-post-name {
    display: inline-block;
    font-weight: 700;
    color: #222;
    word-break: break-word;
  }

  .delete-post-actions {
    display: flex;
    justify-content: center;
    gap: .75rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .delete-post-btn {
    min-width: 140px;
    border-radius: 12px;
    padding: .75rem 1.1rem;
    font-weight: 600;
  }

  .delete-post-btn-danger {
    border: 1px solid rgba(220,53,69,.45);
  }

  @media (max-width: 575.98px) {
    .delete-post-card .card-body {
      padding: 1.5rem 1.15rem;
    }

    .delete-post-actions {
      flex-direction: column;
    }

    .delete-post-btn {
      width: 100%;
    }
  }
</style>

<div class="container py-4 py-md-5 delete-post-wrap">
  <div class="row justify-content-center w-100">
    <div class="col-12 col-md-10 col-lg-7 col-xl-6">

      <div class="card delete-post-card border-0">
        <div class="card-body text-center">

          <h1 class="delete-post-title">Delete Post</h1>

          <p class="delete-post-text">
            Are you sure you want to delete
            <span class="delete-post-name">“{{ post.title }}”</span>?
          </p>

          <form method="post">
            {% csrf_token %}

            <div class="delete-post-actions">
              <button type="submit" class="btn btn-outline-danger delete-post-btn delete-post-btn-danger">
                Yes, Delete
              </button>

              <a href="{% url 'blog:home' %}" class="btn btn-dark delete-post-btn">
                Cancel
              </a>
            </div>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
