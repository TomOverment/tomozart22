{% extends "base.html" %}

{% block title %}Delete {{ post.title }}{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="form-card login-card-shadow">

    <h2 class="form-title text-center">Delete Post</h2>
    <p class="form-subtitle text-center mb-4">
      Are you sure you want to delete <strong>“{{ post.title }}”</strong>?
    </p>

    <form method="post">
      {% csrf_token %}

      <div class="d-flex justify-content-center gap-3 flex-wrap">
        <button type="submit" class="btn btn-dark px-4 py-2">
          Yes, Delete
        </button>

        <a href="{% url 'blog:home' %}" class="btn btn-outline-dark px-4 py-2">
          Cancel
        </a>
      </div>
    </form>

  </div>
</div>
{% endblock %}
