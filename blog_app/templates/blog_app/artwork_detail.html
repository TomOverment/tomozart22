{% extends "base.html" %}
{% block title %} {{ artwork.title }} {% endblock %}

{% block content %}

<div class="container-fluid px-lg-5 golden-layout">
  <div class="row justify-content-center">
    <div class="col-xxl-11">

      <!-- TITLE ROW (Golden Vertical Placement) -->
      <div class="title-row d-flex align-items-center justify-content-center position-relative">

        <a href="{% url 'blog:gallery' %}"
           class="btn btn-outline-dark btn-sm back-btn">
          ← Back
        </a>

        <h1 class="fw-bold text-center mb-0">
          {{ artwork.title }}
        </h1>

      </div>

      <!-- GOLDEN RATIO CONTENT -->
      <div class="row align-items-start g-5">

        <!-- IMAGE (Dominant ≈ 66%) -->
        <div class="col-lg-8 text-center">
          <div class="image-hover-wrapper">
            <img src="{{ artwork.artwork_image.url }}"
                 class="img-fluid rounded floating-image fullscreen-trigger"
                 alt="{{ artwork.title }}">
          </div>
        </div>

        <!-- DESCRIPTION (Secondary ≈ 33%) -->
        <div class="col-lg-4">
          <div class="artwork-description">
            {{ artwork.description|safe }}
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- Fullscreen Overlay -->
<div id="fullscreenOverlay" class="fullscreen-overlay">
  <img src="{{ artwork.artwork_image.url }}" alt="{{ artwork.title }}">
</div>

{% endblock %}
