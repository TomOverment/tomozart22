{% extends "base.html" %} {% block title %} {{ artwork.title }} {% endblock %}
{% block content %}

<div class="container-fluid px-lg-5 golden-layout">
  <div class="row justify-content-center">
    <div class="col-xxl-11">
      <!-- TITLE ROW (Golden Vertical Placement) -->
      <div class="title-row position-relative py-3">
        <!-- Left Button -->
        <a
          href="{% url 'blog:gallery' %}"
          class="btn btn-outline-dark btn-sm position-absolute start-0 top-50 translate-middle-y"
        >
          ← Back to Gallery
        </a>

        <!-- Centered Title -->
        <h1 class="fw-bold text-center mb-0">{{ artwork.title }}</h1>
      </div>

      <!-- GOLDEN RATIO CONTENT -->
      <div class="row align-items-start g-5">
        <!-- IMAGE (Dominant ≈ 66%) -->
        <div class="col-lg-8 text-center">
          <div class="image-hover-wrapper">
            <div class="floating-image">
              <div class="floating-image:hover">
              <img
                src="{{ artwork.artwork_image.url }}"
                class="img-fluid rounded fullscreen-trigger"
                alt="{{ artwork.title }}"
              />
            </div>
          </div>
        </div>

        <!-- DESCRIPTION (Secondary ≈ 33%) -->
        <div class="col-lg-4">
          <div class="artwork-description">{{ artwork.description|safe }}</div>
        </div>
      </div>
    </div>
  </div>
          </div>
        </div>

        <!-- DESCRIPTION (Secondary ≈ 33%) -->
        <div class="col-lg-4">
          <div class="artwork-description">{{ artwork.description|safe }}</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Fullscreen Overlay -->
<div id="fullscreenOverlay" class="fullscreen-overlay">
  <img src="{{ artwork.artwork_image.url }}" alt="{{ artwork.title }}" />
</div>

{% endblock %}
