<form method="post" action="{% url 'blog:newsletter_signup' %}" class="newsletter-signup">
  {% csrf_token %}
  <input type="hidden" name="source" value="{{ source|default:request.path }}">
  <div class="row g-2">
    <div class="col-12 col-md-4">
      <input type="text" name="first_name" class="form-control" placeholder="First name (optional)">
    </div>
    <div class="col-12 col-md-5">
      <input type="email" name="email" class="form-control" placeholder="Your email" required>
    </div>
    <div class="col-12 col-md-3 d-grid">
      <button type="submit" class="btn btn-dark">Sign up</button>
    </div>
  </div>
  <div class="small text-muted mt-2">No spam. Unsubscribe anytime.</div>
</form>
